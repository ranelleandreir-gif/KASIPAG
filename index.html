<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏦 GOD BANK SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Roboto;
  background:#0b1220;
  color:white;
}

.header{
  padding:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
}

.card{
  margin:12px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#4da3ff,#6a5cff);
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

/* LOGIN MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#111a2e;
  padding:20px;
  border-radius:15px;
  width:80%;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="header">
  🏦 GOD MODE BANK SYSTEM
</div>

<div class="grid">

  <div class="card">
    <h3>👑 Admin</h3>
    <button onclick="openLogin()">Login</button>
  </div>

  <div class="card">
    <h3>💰 Cashier</h3>
    <button onclick="go('cashier')">Open</button>
  </div>

  <div class="card">
    <h3>🚚 Collector</h3>
    <button onclick="go('collector')">Open</button>
  </div>

  <div class="card">
    <h3>➕ Add Account</h3>
    <button onclick="go('register')">Create</button>
  </div>

</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>👑 Admin Login</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">LOGIN</button>
    <button onclick="closeLogin()" style="background:#ff4d4d;margin-top:5px;">CLOSE</button>
  </div>
</div>

<script>
function go(page){
  location.href = page + ".html";
}

function openLogin(){
  document.getElementById("loginModal").style.display = "flex";
}

function closeLogin(){
  document.getElementById("loginModal").style.display = "none";
}

/* SIMPLE ADMIN LOGIN (DEMO) */
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  // SIMPLE CHECK (pwede palitan ng Firebase later)
  if(email === "admin@bank.com" && pass === "admin123"){
    location.href = "admin.dashboard.html";
  } else {
    alert("Invalid admin credentials");
  }
}
</script>

</body>
</html>
