<!DOCTYPE html>
<html>
<head>
<title>Collector Ultra Dashboard</title>

<style>
body{margin:0;font-family:Inter;background:#0b1220;color:#fff;}
.card{
  margin:15px;
  padding:15px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}
input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:#22c55e;
  color:#fff;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
  <h3>🚚 Collector Field Panel</h3>

  <input id="borrower" placeholder="Borrower">
  <input id="amount" placeholder="Amount">
  <select id="cashier"></select>

  <button onclick="send()">Send to Cashier</button>
</div>

<div id="list"></div>

<script type="module">
import { db, auth } from './firebase.js';
import { collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;

onAuthStateChanged(auth, user => {
  if(!user) return;
  uid = user.uid;

  onSnapshot(collection(db,"users"), snap => {
    let html = "";

    snap.forEach(d => {
      if(d.data().role === "cashier"){
        html += `<option value="${d.id}">${d.data().email}</option>`;
      }
    });

    cashier.innerHTML = html;
  });

  onSnapshot(collection(db,"collections"), snap => {
    let html = "";

    snap.forEach(d => {
      let x = d.data();
      if(x.collector !== uid) return;

      html += `
        <div class="card">
          ${x.borrower} - ₱${x.amount}<br>
          Status: ${x.status}
        </div>
      `;
    });

    list.innerHTML = html;
  });
});

window.send = async () => {
  await addDoc(collection(db,"collections"), {
    borrower: borrower.value,
    amount: Number(amount.value),
    collector: uid,
    cashier: cashier.value,
    status: "pending",
    time: Date.now()
  });
};
</script>

</body>
</html>
