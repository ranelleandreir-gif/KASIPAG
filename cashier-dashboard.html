<!DOCTYPE html>
<html>
<head>
<title>Cashier Ultra Dashboard</title>

<style>
body{margin:0;font-family:Inter;background:#0b1220;color:#fff;}
.header{padding:15px;background:rgba(255,255,255,0.05);}
.card{
  margin:10px;
  padding:15px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}
button{
  padding:8px;
  margin-top:8px;
  background:#4da3ff;
  border:none;
  color:#fff;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <h3>💰 Cashier Verification Hub</h3>
</div>

<div id="list"></div>

<script type="module">
import { db, auth } from './firebase.js';
import { collection, query, where, onSnapshot, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

onAuthStateChanged(auth, user => {
  if(!user) return;

  const q = query(collection(db,"collections"), where("cashier","==",user.uid));

  onSnapshot(q, snap => {
    let html = "";

    snap.forEach(d => {
      let x = d.data();

      html += `
        <div class="card">
          <b>${x.borrower}</b><br>
          ₱${x.amount}<br>
          Status: ${x.status}<br>
          <button onclick="verify('${d.id}')">✔ Verify</button>
        </div>
      `;
    });

    list.innerHTML = html;
  });
});

window.verify = async (id) => {
  await updateDoc(doc(db,"collections",id), {
    status:"verified"
  });
};
</script>

</body>
</html>
